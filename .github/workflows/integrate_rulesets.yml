name: Deploy Rulesets to Wazuh Cloud

on:
  push:
    branches: ["main"]
    paths: ["rules/**.xml", "decoders/**.xml"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install requests

      - name: Deploy rules and decoders to Wazuh Cloud
        env:
          WAZUH_API_URL: ${{ secrets.WAZUH_API_URL }}
          WAZUH_USER: ${{ secrets.WAZUH_API_USER }}
          WAZUH_PASSWORD: ${{ secrets.WAZUH_API_PASSWORD }}
        run: |
          python deploy_to_wazuh.py
